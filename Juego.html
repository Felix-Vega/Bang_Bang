<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BANG BANG</title>
  <link rel="icon" href="img/pwa-192x192.png">
  <link rel="stylesheet" type="text/css" href="Bang.css">
  <!-- tipografia -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sancreek&display=swap" rel="stylesheet">
  <!-- manifest -->
   <link rel="manifest" href="manifest.webmanifest">
</head>
<body>
    <div class="bg-transicion bg-transicion-show"></div>
    
    <div class="ganador">
        <div class="personajeGanador">
            <h1>Ganador: <span id="nombreganador"></span>
            </h1>
            <img src="" id="imgGanador">
            <button onclick="restart()" class="restart">JUGAR DE NUEVO</button>
        </div>
    </div>

    <div id="escenario" class="escenario bg-juego">
        <!-- Jugador 1 -->
        <h2 id="nombre1" class="nombre nombre-izq"></h2>

        <!-- Jugador 2 -->
        <h2 id="nombre2" class="nombre nombre-der"></h2>

        <!-- Personaje 1 -->
        <img id="p1" class="personaje-izq">

        <!-- Personaje 2 -->
        <img id="p2" class="personaje-der">

        <div class="left" onclick="disparo1()">
            <div class="p1">
                <div class="vidas1"></div>
            </div>
        </div>
        <div class="right" onclick="disparo2()">
            <div class="p2">
                <div class="vidas2"></div>
            </div>
        </div>
    </div>

    <div class="conteo">
        
        <div class="no3"><img src="img/3.png"></div>
        <div class="no2"><img src="img/2.png"></div>
        <div class="no1"><img src="img/1.png"></div>
        <div class="msj" onclick="conteo()">¿LISTOS?</div>
    </div>
</body>

</html>
